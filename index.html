<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fazenda Tucunduva — Painel de Reservas</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#36537D">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Reservas">
  <link rel="apple-touch-icon" href="./assets/icons/icon-apple.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header>
    <div class="header-brand">
      <div class="brand-icon">
        <img src="assets/logo.png" alt="Fazenda Tucunduva">
      </div>
      <div class="brand-text">
        <h1>Fazenda Tucunduva</h1>
        <span>Painel de Reservas</span>
      </div>
    </div>
    <div class="header-date" id="header-date">—</div>
  </header>

  <main>

    <!-- Seletor de evento -------------------------------------------------- -->
    <section id="event-selector" aria-label="Selecionar evento">
      <div id="event-list" role="list" aria-label="Eventos disponíveis"></div>
    </section>

    <!-- Faixa do evento selecionado ---------------------------------------- -->
    <div id="active-event-header" class="active-event-header" style="display:none"></div>

    <!-- Estatísticas -------------------------------------------------------- -->
    <section class="stats-bar" id="stats-bar" aria-label="Resumo das reservas">
      <div class="stat-item"><div class="val" id="s-reservas">—</div><div class="lbl">Reservas</div></div>
      <div class="stat-item"><div class="val" id="s-adultos">—</div><div class="lbl">Adultos</div></div>
      <div class="stat-item"><div class="val" id="s-criancas">—</div><div class="lbl">Crianças</div></div>
      <div class="stat-item"><div class="val" id="s-total">—</div><div class="lbl">Total de pessoas</div></div>
    </section>

    <!-- Barra de ferramentas ------------------------------------------------ -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <label class="sr-only" for="search">Buscar reserva por nome ou mesa</label>
        <input type="text" id="search" placeholder="Buscar por nome ou mesa...">
      </div>

      <div class="filter-group" id="filter-group-area" role="group" aria-label="Filtrar por área">
        <button class="fbtn active" id="btn-all"      type="button" aria-pressed="true">Todas</button>
        <button class="fbtn"        id="btn-externa"  type="button" aria-pressed="false">☀️ Externa</button>
        <button class="fbtn"        id="btn-interna"  type="button" aria-pressed="false">🏠 Interna</button>
      </div>

      <label class="sr-only" for="sort-select">Ordenar reservas por</label>
      <select id="sort-select" class="sort-select">
        <option value="nome">👤 Nome</option>
        <option value="horario">⏰ Horário</option>
        <option value="mesa">🍽️ Mesa</option>
        <option value="area">📍 Área</option>
      </select>

      <button class="btn-refresh" id="btn-refresh" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Atualizar
      </button>

      <span id="visible-counter" class="visible-counter" hidden aria-live="polite"></span>
    </div>

    <!-- Tabela ------------------------------------------------------------- -->
    <div class="table-container">
      <table id="reservas-table">
        <thead>
          <tr>
            <th scope="col">Mesa</th>
            <th scope="col">Nome</th>
            <th scope="col">Horário</th>
            <th scope="col">Pessoas</th>
            <th scope="col" id="th-area-ou-valor">Área</th>
            <th scope="col">Observação</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>

      <div class="empty-state" id="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true" focusable="false"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <p>Nenhuma reserva encontrada</p>
      </div>
    </div>

  </main>

  <footer>
    <div class="dot" id="status-dot" aria-hidden="true"></div>
    <span id="status-text" role="status" aria-live="polite">Aguardando dados</span>
  </footer>

  <script type="module" src="js/main.js"></script>

  <!-- Registro do Service Worker (PWA) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</body>
</html>
